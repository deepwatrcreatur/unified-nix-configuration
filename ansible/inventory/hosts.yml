---
# Unified Nix Configuration - Ansible Inventory
# All hosts managed by this flake repository

all:
  vars:
    ansible_user: deepwatrcreatur
    flake_repo_path: ~/flakes/unified-nix-configuration
    # For hosts where repo is elsewhere
    # flake_repo_path_override: /path/to/repo

  children:
    # NixOS hosts - use nixos-rebuild switch
    nixos:
      hosts:
        gateway:
          ansible_host: gateway  # or 10.10.10.1
          flake_target: gateway
        homeserver:
          ansible_host: homeserver  # or 10.10.10.35
          flake_target: homeserver
        workstation:
          ansible_host: workstation
          flake_target: workstation
        attic-cache:
          ansible_host: attic-cache  # or 10.10.10.71
          flake_target: attic-cache
        podman:
          ansible_host: podman  # or 10.10.11.84
          flake_target: podman

    # NixOS inference VMs
    nixos_inference:
      hosts:
        inference1:
          ansible_host: 10.10.10.18
          flake_target: inference1
        inference2:
          ansible_host: 10.10.10.19
          flake_target: inference2
        inference3:
          ansible_host: 10.10.10.20
          flake_target: inference3

    # Darwin hosts - use darwin-rebuild switch
    darwin:
      hosts:
        hackintosh:
          ansible_host: hackintosh
          flake_target: hackintosh
        macminim4:
          ansible_host: macminim4
          flake_target: macminim4

    # Proxmox hosts - home-manager only (root user)
    proxmox:
      vars:
        ansible_user: root
        flake_repo_path: /root/flakes/unified-nix-configuration
        home_manager_target: proxmox-root
      hosts:
        pve-gateway:
          ansible_host: pve-gateway  # or 10.10.11.1
        pve-lattitude:
          ansible_host: pve-lattitude
        pve-rog:
          ansible_host: 10.10.11.53
        pve-strix:
          ansible_host: pve-strix
        pve-tomahawk:
          ansible_host: pve-tomahawk

    # Groupings for rebuild types
    needs_nixos_rebuild:
      children:
        nixos:
        nixos_inference:

    needs_darwin_rebuild:
      children:
        darwin:

    needs_home_manager:
      children:
        proxmox:
