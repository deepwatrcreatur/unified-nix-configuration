---
# Bootstrap NixOS inference VMs from a live ISO using nixos-anywhere.
# Requirements:
# - Proxmox VM firmware set to plain OVMF (UEFI) on q35
# - Do not enable Secure Boot or pre-enrolled keys
# - Do not attach a persistent efidisk0; let Proxmox use temporary efivars
# - NixOS live installer booted in UEFI mode ("/sys/firmware/efi" must exist)
# - Disk layout defined by hosts/nixos/inference-vm/modules/disko.nix (Btrfs + Limine + snapper)

- name: Bootstrap inference NixOS hosts with nixos-anywhere
  hosts: nixos_inference
  gather_facts: false

  vars:
    repo_root: "{{ playbook_dir | dirname | dirname }}"
    bootstrap_ssh_user: "{{ install_ssh_user | default('nixos') }}"
    bootstrap_disk_device: "{{ install_disk_device | default('/dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi0') }}"
    bootstrap_target_host: "{{ bootstrap_ssh_user }}@{{ ansible_host }}"
    bootstrap_hardware_config_path: "{{ repo_root }}/hosts/nixos/inference-vm/hosts/{{ flake_target }}/hardware-configuration.nix"
    bootstrap_machine_identity_pub_path: "{{ repo_root }}/ssh-keys/agenix-machine-identities/{{ flake_target }}.pub"
    # Set use_attic_cache=true when attic-cache is reachable by IP (e.g. when
    # DNS is unavailable because the router is not yet up).  The cache IP and
    # public key are stable homelab constants; the token is read from agenix.
    use_attic_cache: "{{ use_attic_cache | default(false) }}"
    attic_cache_ip: "{{ attic_cache_ip | default('10.10.11.39') }}"
    attic_cache_pubkey: "cache-local:GozZz7XFsUZ7xI5o/Q36JA/BFfjzONWOjiqC+zAhp2g="
    attic_token_path: /run/agenix/attic-client-token

  tasks:
    - name: Verify the live installer is booted in UEFI mode
      delegate_to: localhost
      shell: >
        ssh -o StrictHostKeyChecking=accept-new {{ bootstrap_target_host }}
        "test -d /sys/firmware/efi"
      args:
        executable: /bin/bash

    # Optional: pre-configure attic substituter by IP so nixos-anywhere can
    # pull pre-built store paths instead of building everything locally.
    # Useful when DNS is unavailable (e.g. during router bootstrap itself).
    # Usage: -e use_attic_cache=true
    - name: Write temporary attic netrc for nixos-anywhere build
      delegate_to: localhost
      shell: |
        token="$(sudo cat {{ attic_token_path }})"
        printf 'machine %s\n  password %s\n' "{{ attic_cache_ip }}" "$token" \
          > /tmp/attic-bootstrap-netrc
        chmod 600 /tmp/attic-bootstrap-netrc
      args:
        executable: /bin/bash
      when: use_attic_cache | bool

    - name: Install host from local flake with nixos-anywhere
      delegate_to: localhost
      environment:
        NIX_CONFIG: |
          {% if use_attic_cache | bool %}
          extra-substituters = http://{{ attic_cache_ip }}:5001/cache-local
          extra-trusted-public-keys = {{ attic_cache_pubkey }}
          netrc-file = /tmp/attic-bootstrap-netrc
          {% endif %}
      command:
        argv:
          - nix
          - run
          - github:nix-community/nixos-anywhere
          - --
          - --flake
          - "{{ repo_root }}#{{ flake_target }}"
          - --target-host
          - "{{ bootstrap_target_host }}"
          - --generate-hardware-config
          - nixos-generate-config
          - "{{ bootstrap_hardware_config_path }}"
          - --ssh-option
          - StrictHostKeyChecking=accept-new
          - --disk
          - main
          - "{{ bootstrap_disk_device }}"

    - name: Clean up temporary attic netrc
      delegate_to: localhost
      file:
        path: /tmp/attic-bootstrap-netrc
        state: absent
      when: use_attic_cache | bool

    - name: Wait for SSH after installation
      delegate_to: localhost
      wait_for:
        host: "{{ ansible_host }}"
        port: 22
        timeout: 300

    - name: Ensure the Limine fallback EFI path exists
      delegate_to: localhost
      shell: >
        ssh -o StrictHostKeyChecking=accept-new root@{{ ansible_host }}
        "if [ -f /boot/EFI/limine/BOOTX64.EFI ]; then
          install -d -m 755 /boot/EFI/BOOT &&
          cp -f /boot/EFI/limine/BOOTX64.EFI /boot/EFI/BOOT/BOOTX64.EFI;
        fi"
      args:
        executable: /bin/bash

    - name: Generate stable agenix machine identity on installed host
      delegate_to: localhost
      shell: >
        ssh -o StrictHostKeyChecking=accept-new root@{{ ansible_host }}
        "install -d -m 700 /var/lib/agenix &&
        if [ ! -f /var/lib/agenix/machine-identity ]; then
          ssh-keygen -t ed25519 -N '' -C 'agenix-machine-identity {{ flake_target }}' -f /var/lib/agenix/machine-identity >/dev/null;
          chmod 400 /var/lib/agenix/machine-identity;
        fi"
      args:
        executable: /bin/bash

    - name: Capture machine identity public key into repo
      delegate_to: localhost
      shell: >
        ssh -o StrictHostKeyChecking=accept-new root@{{ ansible_host }}
        "cat /var/lib/agenix/machine-identity.pub"
        > "{{ bootstrap_machine_identity_pub_path }}"
      args:
        executable: /bin/bash

    - name: Rekey agenix secrets with refreshed recipients
      delegate_to: localhost
      command:
        argv:
          - nix
          - run
          - github:ryantm/agenix
          - --
          - -r
      args:
        chdir: "{{ repo_root }}"

    - name: Show repo status after bootstrap
      delegate_to: localhost
      command:
        argv:
          - git
          - status
          - --short
      args:
        chdir: "{{ repo_root }}"
      register: bootstrap_git_status
      changed_when: false

    - name: Report files that should be reviewed and committed
      debug:
        msg: "{{ bootstrap_git_status.stdout_lines }}"
