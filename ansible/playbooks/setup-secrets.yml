---
# Setup user secrets for nix-ci.com and GitHub authentication
#
# This playbook decrypts agenix secrets using fnox and places them in the
# correct locations for nix and git authentication.
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/setup-secrets.yml
#
# Limit to specific hosts:
#   ansible-playbook -i inventory/hosts.yml playbooks/setup-secrets.yml --limit proxmox
#   ansible-playbook -i inventory/hosts.yml playbooks/setup-secrets.yml --limit pve-gateway

- name: Setup user secrets for nix and git authentication
  hosts: all
  gather_facts: true

  vars:
    secrets_repo_path: "{{ flake_repo_path_override | default(flake_repo_path) }}"
    nix_config_dir: "{{ ansible_env.HOME }}/.config/nix"
    git_config_dir: "{{ ansible_env.HOME }}/.config/git"
    sops_config_dir: "{{ ansible_env.HOME }}/.config/sops"
    age_key_file: "{{ ansible_env.HOME }}/.config/sops/age/keys.txt"

  tasks:
    - name: Check if fnox is available
      command: which fnox
      register: fnox_check
      ignore_errors: true
      changed_when: false

    - name: Check if age key file exists
      stat:
        path: "{{ age_key_file }}"
      register: age_key_stat

    - name: Fail if fnox not available and age key not found
      fail:
        msg: "Neither fnox nor age key file found. Cannot decrypt secrets."
      when:
        - fnox_check.rc != 0
        - not age_key_stat.stat.exists

    - name: Ensure nix config directory exists
      file:
        path: "{{ nix_config_dir }}"
        state: directory
        mode: '0700'

    - name: Ensure git config directory exists
      file:
        path: "{{ git_config_dir }}"
        state: directory
        mode: '0700'

    - name: Ensure sops config directory exists
      file:
        path: "{{ sops_config_dir }}"
        state: directory
        mode: '0700'

    # nix-ci.com netrc setup
    - name: Check if nix-ci-netrc.age exists in repo
      stat:
        path: "{{ secrets_repo_path }}/secrets-agenix/nix-ci-netrc.age"
      register: nix_ci_netrc_age

    - name: Decrypt nix-ci-netrc using age
      shell: |
        age --decrypt -i "{{ age_key_file }}" \
          "{{ secrets_repo_path }}/secrets-agenix/nix-ci-netrc.age" \
          > "{{ nix_config_dir }}/nix-ci-netrc"
      args:
        creates: "{{ nix_config_dir }}/nix-ci-netrc"
      when:
        - nix_ci_netrc_age.stat.exists
        - age_key_stat.stat.exists
      register: nix_ci_decrypt

    - name: Set permissions on nix-ci-netrc
      file:
        path: "{{ nix_config_dir }}/nix-ci-netrc"
        mode: '0600'
      when: nix_ci_decrypt is changed or nix_ci_netrc_age.stat.exists

    # attic cache token setup
    - name: Check if attic-client-token.age exists in repo
      stat:
        path: "{{ secrets_repo_path }}/secrets-agenix/attic-client-token.age"
      register: attic_client_token_age

    - name: Decrypt attic-client-token using age
      shell: |
        age --decrypt -i "{{ age_key_file }}" \
          "{{ secrets_repo_path }}/secrets-agenix/attic-client-token.age" \
          > "{{ sops_config_dir }}/attic-client-token"
      args:
        creates: "{{ sops_config_dir }}/attic-client-token"
      when:
        - attic_client_token_age.stat.exists
        - age_key_stat.stat.exists
      register: attic_client_token_decrypt

    - name: Set permissions on attic-client-token
      file:
        path: "{{ sops_config_dir }}/attic-client-token"
        mode: '0600'
      when: attic_client_token_decrypt is changed or attic_client_token_age.stat.exists

    - name: Bootstrap Determinate netrc for Proxmox hosts
      shell: |
        set -euo pipefail
        tmp="$(mktemp)"
        {
          echo "# BEGIN home-manager managed nix-user-config"
          if [ -f "{{ sops_config_dir }}/attic-client-token" ]; then
            echo "machine attic-cache"
            echo "password $(cat "{{ sops_config_dir }}/attic-client-token")"
            echo
          fi
          if [ -f "{{ nix_config_dir }}/nix-ci-netrc" ]; then
            cat "{{ nix_config_dir }}/nix-ci-netrc"
            echo
          fi
          echo "# END home-manager managed nix-user-config"
        } > "$tmp"
        install -d -m 755 /nix/var/determinate
        install -m 600 "$tmp" /nix/var/determinate/netrc
        rm -f "$tmp"
      args:
        executable: /bin/bash
      when: "'proxmox' in group_names"
      register: determinate_netrc_bootstrap

    # GitHub token setup
    - name: Check if github-token.age exists in repo
      stat:
        path: "{{ secrets_repo_path }}/secrets-agenix/github-token.age"
      register: github_token_age

    - name: Decrypt github-token using age
      shell: |
        age --decrypt -i "{{ age_key_file }}" \
          "{{ secrets_repo_path }}/secrets-agenix/github-token.age" \
          > "{{ git_config_dir }}/github-token"
      args:
        creates: "{{ git_config_dir }}/github-token"
      when:
        - github_token_age.stat.exists
        - age_key_stat.stat.exists
      register: github_token_decrypt

    - name: Set permissions on github-token
      file:
        path: "{{ git_config_dir }}/github-token"
        mode: '0600'
      when: github_token_decrypt is changed or github_token_age.stat.exists

    # Remote builder SSH key setup
    - name: Check if nix-remote-builder-key.age exists in repo
      stat:
        path: "{{ secrets_repo_path }}/secrets-agenix/nix-remote-builder-key.age"
      register: remote_builder_key_age

    - name: Ensure .ssh directory exists
      file:
        path: "{{ ansible_env.HOME }}/.ssh"
        state: directory
        mode: '0700'

    - name: Decrypt nix-remote-builder-key using age
      shell: |
        age --decrypt -i "{{ age_key_file }}" \
          "{{ secrets_repo_path }}/secrets-agenix/nix-remote-builder-key.age" \
          > "{{ ansible_env.HOME }}/.ssh/nix-remote"
      args:
        creates: "{{ ansible_env.HOME }}/.ssh/nix-remote"
      when:
        - remote_builder_key_age.stat.exists
        - age_key_stat.stat.exists
      register: remote_builder_key_decrypt

    - name: Set permissions on nix-remote builder key
      file:
        path: "{{ ansible_env.HOME }}/.ssh/nix-remote"
        mode: '0600'
      when: remote_builder_key_decrypt is changed or remote_builder_key_age.stat.exists

    - name: Add attic-cache to known_hosts
      known_hosts:
        path: "{{ ansible_env.HOME }}/.ssh/known_hosts"
        name: "10.10.11.39"
        key: "10.10.11.39 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBMzmqOZ301fwZJVQI5KZ9+npuFs+3EvwKet4peLZeLv"
        state: present
      when: remote_builder_key_age.stat.exists

    - name: Configure /etc/nix/machines for remote building
      copy:
        content: |
          ssh://deepwatrcreatur@10.10.11.39 x86_64-linux {{ ansible_env.HOME }}/.ssh/nix-remote 8 2 nixos-test,benchmark,big-parallel,kvm - -
        dest: /etc/nix/machines
        mode: '0644'
      when:
        - remote_builder_key_age.stat.exists
        - "'proxmox' in group_names or 'ubuntu_inference' in group_names"
      register: machines_config

    # Verification
    - name: Verify nix-ci-netrc was created
      stat:
        path: "{{ nix_config_dir }}/nix-ci-netrc"
      register: nix_ci_verify

    - name: Verify github-token was created
      stat:
        path: "{{ git_config_dir }}/github-token"
      register: github_token_verify

    - name: Verify attic-client-token was created
      stat:
        path: "{{ sops_config_dir }}/attic-client-token"
      register: attic_client_token_verify

    - name: Verify Determinate netrc exists on Proxmox hosts
      stat:
        path: "/nix/var/determinate/netrc"
      register: determinate_netrc_verify
      when: "'proxmox' in group_names"

    - name: Verify remote builder key was created
      stat:
        path: "{{ ansible_env.HOME }}/.ssh/nix-remote"
      register: remote_builder_verify

    - name: Verify /etc/nix/machines was created
      stat:
        path: "/etc/nix/machines"
      register: nix_machines_verify
      when: "'proxmox' in group_names or 'ubuntu_inference' in group_names"

    - name: Show results
      debug:
        msg:
          - "nix-ci-netrc: {{ 'Created' if nix_ci_verify.stat.exists else 'Missing' }}"
          - "attic-client-token: {{ 'Created' if attic_client_token_verify.stat.exists else 'Missing' }}"
          - "github-token: {{ 'Created' if github_token_verify.stat.exists else 'Missing' }}"
          - "remote-builder-key: {{ 'Created' if remote_builder_verify.stat.exists else 'Missing' }}"
          - "nix-machines: {{ 'Created' if nix_machines_verify.stat.exists | default(false) else 'Skipped' if 'proxmox' not in group_names and 'ubuntu_inference' not in group_names else 'Missing' }}"
          - "determinate-netrc: {{ 'Created' if determinate_netrc_verify.stat.exists | default(false) else 'Skipped' if 'proxmox' not in group_names else 'Missing' }}"
